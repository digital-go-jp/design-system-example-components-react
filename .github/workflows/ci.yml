name: CI

on:
  push:
    branches-ignore:
      - main

jobs:
  deploy:
    permissions:
      contents: read
      pull-requests: write
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "^22.22.0"
          cache: "npm"
      - name: Install packages
        run: |
          npm ci
      - name: Lint
        run: |
          npm run lint
      - name: Install Playwright browsers
        run: npm run test:setup
      - name: Test
        run: npm test
